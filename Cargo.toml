[package]
name = "PlasmaBob"
version = "0.1.0"
edition = "2024"

[dependencies]
avian2d = "0.2.0"
bevy = { version = "0.15", features = ["jpeg", "bevy_animation"] }
bevy_framepace = "0.18.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.dev]
opt-level = 2
lto = "thin"

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

