name: Build and release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Automated build for tag ${{ github.ref_name }}"
          draft: false
          prerelease: false

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build release (linux)
        run: cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          cp -r assets dist/assets
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-linux.tar.gz PlasmaBob assets

      - name: Upload linux asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "PlasmaBob-${{ github.ref_name }}-linux.tar.gz" --clobber

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml

      - name: Build release (windows)
        run: cargo build --release

      - name: Package (zip)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -Path target\release\PlasmaBob.exe -Destination dist\PlasmaBob.exe
          Copy-Item -Path assets -Destination dist\assets -Recurse -Force
          Compress-Archive -Path dist\PlasmaBob.exe, dist\assets -DestinationPath PlasmaBob-${{ github.ref_name }}-windows.zip

      - name: Upload windows asset to GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "PlasmaBob-${{ github.ref_name }}-windows.zip" --clobber

  build-macos:
    name: Build (macos-arm)
    runs-on: macos-14
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build release (macos)
        run: cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          cp -r assets dist/assets
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz PlasmaBob assets

      - name: Upload macOS asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz" --clobber
