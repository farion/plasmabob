name: Build and release

on:
  push:
    tags:
      - "*"

jobs:
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release (linux)
        run: |
          cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-linux.tar.gz PlasmaBob

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaBob-linux
          path: PlasmaBob-${{ github.ref_name }}-linux.tar.gz

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release (windows)
        run: |
          cargo build --release

      - name: Package (zip)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -Path target\release\PlasmaBob.exe -Destination dist\PlasmaBob.exe
          Compress-Archive -Path dist\PlasmaBob.exe -DestinationPath PlasmaBob-${{ github.ref_name }}-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaBob-windows
          path: PlasmaBob-${{ github.ref_name }}-windows.zip

  build-macos:
    name: Build (macos-arm)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release (macos)
        run: |
          # Attempt to build natively on the macOS runner. If the runner is arm64
          # this will produce an aarch64-apple-darwin binary as requested.
          cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz PlasmaBob

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaBob-macos
          path: PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: PlasmaBob-linux

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PlasmaBob-windows

      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: PlasmaBob-macos

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Automated build for tag ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload linux asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: PlasmaBob-${{ github.ref_name }}-linux.tar.gz
          asset_name: PlasmaBob-${{ github.ref_name }}-linux.tar.gz
          asset_content_type: application/gzip

      - name: Upload windows asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: PlasmaBob-${{ github.ref_name }}-windows.zip
          asset_name: PlasmaBob-${{ github.ref_name }}-windows.zip
          asset_content_type: application/zip

      - name: Upload macos asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz
          asset_name: PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz
          asset_content_type: application/gzip

