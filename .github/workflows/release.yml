name: Build and release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release (idempotent) via gh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # authenticate gh using the provided token
          echo "$GH_TOKEN" | gh auth login --with-token

          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            echo "Creating release $TAG"
            gh release create "$TAG" -t "$TAG" -n "Automated build for tag $TAG"
          fi

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          if command -v rustup >/dev/null 2>&1; then
            echo "rustup already installed"
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          fi
          source $HOME/.cargo/env
          rustup default stable

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build release (linux)
        run: cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          cp -r assets dist/assets
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-linux.tar.gz PlasmaBob assets

      - name: Upload linux asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | gh auth login --with-token
          gh release upload "${{ github.ref_name }}" "PlasmaBob-${{ github.ref_name }}-linux.tar.gz" --clobber

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          Write-Host "Installing rustup and stable toolchain"
          $env:RUSTUP_INIT_SKIP_PATH_CHECK = "1"
          Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
          Start-Process -FilePath rustup-init.exe -ArgumentList "-y" -Wait
          $env:Path += ";$env:USERPROFILE\.cargo\bin"
          rustup default stable

      - name: Set version from tag
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml

      - name: Build release (windows)
        run: cargo build --release

      - name: Package (zip)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -Path target\release\PlasmaBob.exe -Destination dist\PlasmaBob.exe
          Copy-Item -Path assets -Destination dist\assets -Recurse -Force
          Compress-Archive -Path dist\PlasmaBob.exe, dist\assets -DestinationPath PlasmaBob-${{ github.ref_name }}-windows.zip

      - name: Upload windows asset to GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo $env:GH_TOKEN | gh auth login --with-token
          gh release upload "${{ github.ref_name }}" "PlasmaBob-${{ github.ref_name }}-windows.zip" --clobber

  build-macos:
    name: Build (macos-arm)
    runs-on: macos-14
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          if command -v rustup >/dev/null 2>&1; then
            echo "rustup already installed"
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          fi
          source $HOME/.cargo/env
          rustup default stable

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build release (macos)
        run: cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          cp -r assets dist/assets
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz PlasmaBob assets

      - name: Upload macOS asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | gh auth login --with-token
          gh release upload "${{ github.ref_name }}" "PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz" --clobber
