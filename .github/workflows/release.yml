name: Build and release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release (linux)
        run: |
          cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          cp -r assets dist/assets
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-linux.tar.gz PlasmaBob assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaBob-linux
          path: PlasmaBob-${{ github.ref_name }}-linux.tar.gz

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release (windows)
        run: |
          cargo build --release

      - name: Package (zip)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -Path target\release\PlasmaBob.exe -Destination dist\PlasmaBob.exe
          Copy-Item -Path assets -Destination dist\assets -Recurse -Force
          Compress-Archive -Path dist\PlasmaBob.exe, dist\assets -DestinationPath PlasmaBob-${{ github.ref_name }}-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaBob-windows
          path: PlasmaBob-${{ github.ref_name }}-windows.zip

  build-macos:
    name: Build (macos-arm)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release (macos)
        run: cargo build --release

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/PlasmaBob dist/PlasmaBob
          cp -r assets dist/assets
          tar -C dist -czf PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz PlasmaBob assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaBob-macos
          path: PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: PlasmaBob-linux
          path: release-assets/linux

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PlasmaBob-windows
          path: release-assets/windows

      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: PlasmaBob-macos
          path: release-assets/macos

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Automated build for tag ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            release-assets/linux/PlasmaBob-${{ github.ref_name }}-linux.tar.gz
            release-assets/windows/PlasmaBob-${{ github.ref_name }}-windows.zip
            release-assets/macos/PlasmaBob-${{ github.ref_name }}-macos-aarch64.tar.gz

